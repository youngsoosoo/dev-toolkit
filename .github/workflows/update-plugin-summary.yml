name: Update plugin summary

on:
  push:
    branches:
      - main
    paths:
      - 'plugins/**/*.md'
      - 'scripts/generate-plugin-summary.sh'
      - 'scripts/update-readme-plugin-summary.sh'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-plugin-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README plugin summary
        run: bash scripts/update-readme-plugin-summary.sh

      - name: Commit README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: docs: update plugin summary counts
          file_pattern: README.md
